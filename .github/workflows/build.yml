name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore PuTTYProfileManager\PuTTYProfileManager.slnx

      - name: Build solution (Release)
        run: dotnet build PuTTYProfileManager\PuTTYProfileManager.slnx -c Release --no-restore

      - name: Publish GUI (framework-dependent)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release -r win-x64 --self-contained false -o PuTTYProfileManager\publish

      - name: Publish CLI (cross-platform)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager.Cli\PuTTYProfileManager.Cli.csproj -c Release -o PuTTYProfileManager\publish-cli

      - name: Build WiX installer
        run: dotnet build PuTTYProfileManager\setup\PuTTYProfileManagerSetup.wixproj -c Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PuTTYProfileManagerSetup
          path: PuTTYProfileManager\setup\bin\Release\*.msi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-cli
          path: PuTTYProfileManager\publish-cli\

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish GUI (framework-dependent)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release -r win-x64 --self-contained false -o PuTTYProfileManager\publish

      - name: Publish CLI (cross-platform)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager.Cli\PuTTYProfileManager.Cli.csproj -c Release -o PuTTYProfileManager\publish-cli

      - name: Build WiX installer
        run: dotnet build PuTTYProfileManager\setup\PuTTYProfileManagerSetup.wixproj -c Release

      - name: Zip CLI for release
        run: Compress-Archive -Path PuTTYProfileManager\publish-cli\* -DestinationPath puttymgr-cli.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PuTTY Profile Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            PuTTYProfileManager\setup\bin\Release\PuTTYProfileManagerSetup.msi
            puttymgr-cli.zip
