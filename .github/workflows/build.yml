name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj

      - name: Build app (Release)
        run: dotnet build PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release --no-restore

      - name: Publish app (framework-dependent)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release -r win-x64 --self-contained false -o PuTTYProfileManager\publish

      - name: Build WiX installer
        run: dotnet build PuTTYProfileManager\setup\PuTTYProfileManagerSetup.wixproj -c Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PuTTYProfileManagerSetup
          path: PuTTYProfileManager\setup\bin\Release\*.msi

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj

      - name: Publish app (framework-dependent)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release -r win-x64 --self-contained false -o PuTTYProfileManager\publish

      - name: Build WiX installer
        run: dotnet build PuTTYProfileManager\setup\PuTTYProfileManagerSetup.wixproj -c Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PuTTY Profile Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            PuTTYProfileManager\setup\bin\Release\PuTTYProfileManagerSetup.msi
