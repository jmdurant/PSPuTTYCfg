name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build (excluding WiX)
        run: |
          dotnet restore PuTTYProfileManager\PuTTYProfileManager.slnx
          dotnet build PuTTYProfileManager\src\PuTTYProfileManager.Core\PuTTYProfileManager.Core.csproj -c Release --no-restore
          dotnet build PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release --no-restore
          dotnet build PuTTYProfileManager\src\PuTTYProfileManager.Cli\PuTTYProfileManager.Cli.csproj -c Release --no-restore
          dotnet build PuTTYProfileManager\src\PuTTYProfileManager.Avalonia\PuTTYProfileManager.Avalonia.csproj -c Release --no-restore

      - name: Publish GUI (framework-dependent)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager\PuTTYProfileManager.csproj -c Release -r win-x64 --self-contained false -o PuTTYProfileManager\publish

      - name: Publish CLI (win-x64)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager.Cli\PuTTYProfileManager.Cli.csproj -c Release -r win-x64 --self-contained true -o PuTTYProfileManager\publish-cli-win-x64

      - name: Publish CLI (linux-x64)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager.Cli\PuTTYProfileManager.Cli.csproj -c Release -r linux-x64 --self-contained true -o PuTTYProfileManager\publish-cli-linux-x64

      - name: Publish Avalonia GUI (win-x64)
        run: dotnet publish PuTTYProfileManager\src\PuTTYProfileManager.Avalonia\PuTTYProfileManager.Avalonia.csproj -c Release -r win-x64 --self-contained true -o PuTTYProfileManager\publish-gui-win-x64

      - name: Build WiX installer
        run: dotnet build PuTTYProfileManager\setup\PuTTYProfileManagerSetup.wixproj -c Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PuTTYProfileManagerSetup
          path: PuTTYProfileManager\setup\bin\Release\*.msi

      - name: Upload CLI artifact (win-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-cli-win-x64
          path: PuTTYProfileManager\publish-cli-win-x64\

      - name: Upload CLI artifact (linux-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-cli-linux-x64
          path: PuTTYProfileManager\publish-cli-linux-x64\

      - name: Upload GUI artifact (win-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-gui-win-x64
          path: PuTTYProfileManager\publish-gui-win-x64\

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Avalonia GUI (linux-x64)
        run: dotnet publish PuTTYProfileManager/src/PuTTYProfileManager.Avalonia/PuTTYProfileManager.Avalonia.csproj -c Release -r linux-x64 --self-contained true -o publish-gui-linux-x64

      - name: Upload GUI artifact (linux-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-gui-linux-x64
          path: publish-gui-linux-x64/

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish CLI (osx-arm64)
        run: dotnet publish PuTTYProfileManager/src/PuTTYProfileManager.Cli/PuTTYProfileManager.Cli.csproj -c Release -r osx-arm64 --self-contained true -o publish-cli-osx-arm64

      - name: Publish CLI (osx-x64)
        run: dotnet publish PuTTYProfileManager/src/PuTTYProfileManager.Cli/PuTTYProfileManager.Cli.csproj -c Release -r osx-x64 --self-contained true -o publish-cli-osx-x64

      - name: Publish Avalonia GUI (osx-arm64)
        run: dotnet publish PuTTYProfileManager/src/PuTTYProfileManager.Avalonia/PuTTYProfileManager.Avalonia.csproj -c Release -r osx-arm64 --self-contained true -o publish-gui-osx-arm64

      - name: Publish Avalonia GUI (osx-x64)
        run: dotnet publish PuTTYProfileManager/src/PuTTYProfileManager.Avalonia/PuTTYProfileManager.Avalonia.csproj -c Release -r osx-x64 --self-contained true -o publish-gui-osx-x64

      - name: Upload CLI artifact (osx-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-cli-osx-arm64
          path: publish-cli-osx-arm64/

      - name: Upload CLI artifact (osx-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-cli-osx-x64
          path: publish-cli-osx-x64/

      - name: Upload GUI artifact (osx-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-gui-osx-arm64
          path: publish-gui-osx-arm64/

      - name: Upload GUI artifact (osx-x64)
        uses: actions/upload-artifact@v4
        with:
          name: puttymgr-gui-osx-x64
          path: publish-gui-osx-x64/

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip release assets
        run: |
          cd artifacts
          zip -r ../PuTTYProfileManagerSetup.zip PuTTYProfileManagerSetup/
          zip -r ../puttymgr-cli-win-x64.zip puttymgr-cli-win-x64/
          zip -r ../puttymgr-cli-linux-x64.zip puttymgr-cli-linux-x64/
          zip -r ../puttymgr-cli-osx-x64.zip puttymgr-cli-osx-x64/
          zip -r ../puttymgr-cli-osx-arm64.zip puttymgr-cli-osx-arm64/
          zip -r ../puttymgr-gui-win-x64.zip puttymgr-gui-win-x64/
          zip -r ../puttymgr-gui-linux-x64.zip puttymgr-gui-linux-x64/
          zip -r ../puttymgr-gui-osx-x64.zip puttymgr-gui-osx-x64/
          zip -r ../puttymgr-gui-osx-arm64.zip puttymgr-gui-osx-arm64/

      - name: Get MSI path
        id: msi
        run: echo "path=$(find artifacts/PuTTYProfileManagerSetup -name '*.msi' | head -1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PuTTY Profile Manager ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.msi.outputs.path }}
            puttymgr-cli-win-x64.zip
            puttymgr-cli-linux-x64.zip
            puttymgr-cli-osx-x64.zip
            puttymgr-cli-osx-arm64.zip
            puttymgr-gui-win-x64.zip
            puttymgr-gui-linux-x64.zip
            puttymgr-gui-osx-x64.zip
            puttymgr-gui-osx-arm64.zip
